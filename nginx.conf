worker_processes 1;

events {
  worker_connections 512;
}

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile on;
  tcp_nopush on;
  keepalive_timeout 30;
  server_tokens off;

  limit_req_zone $binary_remote_addr zone=thotsparkz_per_ip:10m rate=100r/m;

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_vary on;
  gzip_types text/plain text/css text/xml application/javascript application/json application/xml image/svg+xml;

  brotli on;
  brotli_comp_level 5;
  brotli_types text/plain text/css application/javascript application/json application/xml image/svg+xml;

  server {
    listen 80;
    listen 443 ssl http2;
    server_name thotsparkz.com www.thotsparkz.com;
    root /var/www/thotsparkz/dist;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/thotsparkz.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thotsparkz.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' https://images.unsplash.com https://www.castelfalfi.com data:; media-src 'self'; connect-src 'self'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests" always;

    if ($scheme = http) {
      return 301 https://$host$request_uri;
    }

    location = /health {
      access_log off;
      add_header Cache-Control "no-store";
      default_type application/json;
      return 200 '{"status":"ok","service":"thotsparkz"}';
    }

    location ~* \.(?:js|css|png|jpg|jpeg|gif|webp|svg|ico|mp4|woff2?)$ {
      try_files $uri =404;
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    location ~* \.(?:html)$ {
      try_files $uri =404;
      add_header Cache-Control "no-cache";
    }

    location ~* ^/(?:api|admin|wp-admin|xmlrpc\.php|\.env|\.git) {
      return 444;
    }

    location / {
      limit_req zone=thotsparkz_per_ip burst=40 nodelay;
      try_files $uri $uri/ /index.html;
      add_header Cache-Control "no-cache";
    }
  }
}
